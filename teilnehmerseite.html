<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Teilnehmerseite – Jump & Pump Bad Waldsee</title>
<style>
  html,body{
    height:100%;
  }
  body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f4f4f4;
    min-height:100vh;
    padding:0;
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
  }
  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    padding:20px 40px;
  }
  .header-text{
    text-align:left;
  }
  .header-text .kicker{
    display:block;
    font-size:14px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#a81815;
    font-weight:bold;
    margin-bottom:4px;
  }
  .header-text h1{
    margin:0;
    font-size:32px;
    font-weight:bold;
    color:#222;
    border-left:6px solid #a81815;
    padding-left:14px;
  }
  .header-buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#a81815;
    color:#fff;
    text-decoration:none;
    font-weight:bold;
    font-size:16px;
    padding:10px 18px;
    border-radius:8px;
    transition:.2s;
    white-space:nowrap;
  }
  .back-link.secondary{
    background:#666;
  }
  .back-link:hover{
    transform:scale(1.05);
    box-shadow:0 4px 12px rgba(0,0,0,.2);
  }
  .content{
    flex:1;
    width:100%;
    background:#fff;
    overflow:auto;
    box-sizing:border-box;
    padding:20px 40px;
  }
  .content .RRParticipantView{
    width:100%;
  }
</style>
</head>
<body>

  <div class="header">
    <div class="header-text">
      <span class="kicker">Jump & Pump Bad Waldsee 2027</span>
      <h1>Teilnehmer</h1>
    </div>
    <div class="header-buttons">
      <a class="back-link secondary" href="teilnehmer.html">&larr; Andere Startnummer</a>
      <a class="back-link" href="index.html">Zur Übersicht</a>
    </div>
  </div>

  <div class="content">
    <div id="divRRParticipantView" class="RRParticipantView"></div>
    <script type="text/javascript" src="https://my.raceresult.com/RRParticipantView/load.js?lang=de"></script>
    <script type="text/javascript">
      const RR_EVENT_ID = 410823;
      const urlParams = new URLSearchParams(window.location.search);
      /* Entweder pid oder bib wird genutzt. Der nicht verwendete Wert wird auf 0 gesetzt. */
      const pid = parseInt(urlParams.get("pid")) || 0;
      const bib = parseInt(urlParams.get("bib")) || 0;

      let rrp = new RRParticipantView(document.getElementById("divRRParticipantView"), RR_EVENT_ID, "details", pid, bib);
      rrp.ShowTimerLogo = true;
    </script>
  </div>

</body>
</html>
