<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ergebnisse – Jump & Pump Bad Waldsee</title>
<style>
  html,body{
    height:100%;
    scrollbar-width:none;
  }
  body::-webkit-scrollbar{
    display:none;
  }
  body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f4f4f4;
    min-height:100vh;
    padding:0;
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
  }
  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    padding:20px 40px;
  }
  .header-text{
    text-align:left;
  }
  .header-text .kicker{
    display:block;
    font-size:14px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#a81815;
    font-weight:bold;
    margin-bottom:4px;
  }
  .header-text h1{
    margin:0;
    font-size:32px;
    font-weight:bold;
    color:#222;
    border-left:6px solid #a81815;
    padding-left:14px;
  }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#a81815;
    color:#fff;
    text-decoration:none;
    font-weight:bold;
    font-size:16px;
    padding:10px 18px;
    border-radius:8px;
    transition:.2s;
    white-space:nowrap;
  }
  .back-link:hover{
    transform:scale(1.05);
    box-shadow:0 4px 12px rgba(0,0,0,.2);
  }
  .content{
    flex:1;
    width:100%;
    background:#fff;
    overflow:auto;
    padding:0;
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
    scrollbar-width:none;
  }
  .content::-webkit-scrollbar{
    display:none;
  }
  .content .RRPublish{
    flex:1;
    width:90%;
    margin:0 auto;
  }
  .RRPublish div.ListControl {
    display: none !important;
  }
  .RRPublish div.SelectorParent > div.Selector {
    display: none !important;
  }
  .RRPublish table.MainTable td.listGrouping {
    font-size: larger !important;
  }

</style>
</head>
<body>

  <div class="header">
    <div class="header-text">
      <span class="kicker">Willkommen bei</span>
      <h1>Jump & Pump Bad Waldsee 2027</h1>
    </div>
    <a class="back-link" href="index.html">&larr; Zurück zur Übersicht</a>
  </div>

  <div class="content">
    <div id="divRRPublish_results" class="RRPublish"></div>
    <script type="text/javascript" src="https://my.raceresult.com/RRPublish/load.js.php?lang=de"></script>
    <script type="text/javascript">
      var rrp = new RRPublish(document.getElementById("divRRPublish_results"), 410823, "results");
      rrp.ShowTimerLogo = true;
      rrp.ShowInfoText = false;
    </script>
  </div>

</body>
</html>
