<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Aufnahme – Jump & Pump Bad Waldsee</title>
<style>
  html,body{
    height:100%;
    margin:0;
    overflow:hidden;
    scrollbar-width:none;
  }
  body::-webkit-scrollbar{
    display:none;
  }
  body{
    font-family:Arial,sans-serif;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* 16:9-Bühne, passt sich an Hoch- oder Querformat an */
  .stage{
    width:min(100vw, 177.78vh);
    height:min(100vh, 56.25vw);
    background:#f4f4f4;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 0 40px rgba(0,0,0,.5);
  }

  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    padding:20px 40px;
    flex-shrink:0;
  }
  .header-text{
    text-align:left;
  }
  .header-text .kicker{
    display:block;
    font-size:14px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#a81815;
    font-weight:bold;
    margin-bottom:4px;
  }
  .header-text h1{
    margin:0;
    font-size:32px;
    font-weight:bold;
    color:#222;
    border-left:6px solid #a81815;
    padding-left:14px;
  }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#a81815;
    color:#fff;
    text-decoration:none;
    font-weight:bold;
    font-size:16px;
    padding:10px 18px;
    border-radius:8px;
    transition:.2s;
    white-space:nowrap;
  }
  .back-link:hover{
    transform:scale(1.05);
    box-shadow:0 4px 12px rgba(0,0,0,.2);
  }

  .content{
    flex:1;
    min-height:0;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    box-sizing:border-box;
    padding:1.5vh 3vh;
    gap:1.5vh;
  }

  .bib-display{
    font-size:2.6vh;
    color:#222;
    font-weight:bold;
    background:#fff;
    padding:1.2vh 3vh;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    text-align:center;
    flex-shrink:0;
  }
  .bib-display #nameLine{
    color:#222;
  }
  .bib-display #nameLine .bib-number{
    color:#a81815;
  }
  .bib-display #clubLine{
    font-size:2.6vh;
    color:#666;
    margin-top:2px;
  }

  .cam-stage{
    position:relative;
    flex:1;
    min-height:0;
    width:auto;
    max-width:100%;
    aspect-ratio:4/3;
    background:#000;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 16px rgba(0,0,0,.25);
  }
  .cam-stage video,
  .cam-stage canvas,
  .cam-stage img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .countdown-overlay{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.35);
    font-size:12vh;
    font-weight:bold;
    color:#fff;
    text-shadow:0 4px 12px rgba(0,0,0,.5);
  }

  .status-text{
    font-size:1.6vh;
    color:#555;
    text-align:center;
    min-height:2vh;
    flex-shrink:0;
  }
  .controls{
    display:flex;
    gap:1.5vh;
    flex-wrap:wrap;
    justify-content:center;
    flex-shrink:0;
  }
  .action-btn{
    background:#a81815;
    color:#fff;
    border:none;
    font-weight:bold;
    font-size:1.8vh;
    padding:1.2vh 2.5vh;
    border-radius:8px;
    cursor:pointer;
    transition:.2s;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
  }
  .action-btn:hover{
    transform:scale(1.05);
    box-shadow:0 4px 12px rgba(0,0,0,.2);
  }
  .action-btn:disabled{
    background:#ccc;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
  }
  .action-btn.secondary{
    background:#666;
  }
  .action-btn.save{
    background:#2e7d32;
  }
</style>
</head>
<body>

  <div class="stage">

    <div class="header">
      <div class="header-text">
        <span class="kicker">Jump & Pump Bad Waldsee 2027</span>
        <h1>Bild aufnehmen</h1>
      </div>
      <a class="back-link" href="index.html">&larr; Zurück zur Übersicht</a>
    </div>

    <div class="content">
      <div class="bib-display" id="bibDisplayBox">
        <div id="nameLine">–</div>
        <div id="clubLine" style="display:none;"></div>
      </div>

      <div class="cam-stage" id="camStage">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="photo" style="display:none;" alt="Aufgenommenes Bild">
        <div class="countdown-overlay" id="countdownOverlay">5</div>
      </div>

      <div class="status-text" id="statusText">Kamera wird gestartet …</div>

      <div class="controls">
        <button class="action-btn" id="captureBtn" disabled>📸 Bild aufnehmen (5 Sek)</button>
        <button class="action-btn secondary" id="retakeBtn" style="display:none;">↻ Neues Bild</button>
        <button class="action-btn save" id="saveBtn" style="display:none;">💾 Speichern</button>
        <a class="action-btn secondary" id="newBibBtn" href="cam.html" style="display:none;">🔁 Andere Startnummer</a>
        <a class="action-btn" id="homeBtn" href="index.html" style="display:none;">🏠 Zur Übersicht</a>
      </div>
    </div>

  </div>

  <script>
    const nameLine = document.getElementById('nameLine');
    const clubLine = document.getElementById('clubLine');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const photo = document.getElementById('photo');
    const countdownOverlay = document.getElementById('countdownOverlay');
    const statusText = document.getElementById('statusText');
    const captureBtn = document.getElementById('captureBtn');
    const retakeBtn = document.getElementById('retakeBtn');
    const saveBtn = document.getElementById('saveBtn');
    const newBibBtn = document.getElementById('newBibBtn');
    const homeBtn = document.getElementById('homeBtn');

    const RR_EVENT_ID = "410823";
    const RR_WRITE_API_KEY = "JVO4S5NUVOQJ7AHC2IHDVE9H2BLX9HWY";
    const RR_READ_API_KEY = "X9JQNUP2KLJPPA16B6YI7I1MDUUN60I8";
    const RR_FIELD_NAME = "FinishPic";
    const RR_WRITE_URL = `https://api.raceresult.com/${RR_EVENT_ID}/${RR_WRITE_API_KEY}`;
    const RR_READ_URL = `https://api.raceresult.com/${RR_EVENT_ID}/${RR_READ_API_KEY}`;

    const CLOUDINARY_CLOUD_NAME = "fqcfrlxz";
    const CLOUDINARY_UPLOAD_PRESET = "JumpAndPumpBW";
    const CLOUDINARY_UPLOAD_URL = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`;

    let stream = null;
    let lastImageBlob = null;

    const urlParams = new URLSearchParams(window.location.search);
    const currentBib = urlParams.get('bib');

    if(!currentBib){
      statusText.textContent = "Keine Startnummer übergeben – bitte über die vorherige Seite starten.";
      captureBtn.disabled = true;
    } else {
      nameLine.innerHTML = `<span class="bib-number">#${currentBib}</span>`;
      startCamera();
      loadParticipantInfo(currentBib);
    }

    async function loadParticipantInfo(bib){
      try{
        const url = `${RR_READ_URL}?filterbib=${encodeURIComponent(bib)}&listformat=JSON`;
        const response = await fetch(url);
        const data = await response.json();

        if(!Array.isArray(data) || data.length === 0) return;

        const bibKey = Object.keys(data[0]).find(k => k.toLowerCase().replace(/\s/g,'') === 'bib');
        const row = data.find(r => String(r[bibKey]).trim() === String(bib).trim());
        if(!row) return;

        const vorname = row["Vorname"] || "";
        const nachname = row["Nachname"] || "";
        const verein = row["Verein"] || "";

        const namePart = `${vorname} ${nachname}`.trim();
        nameLine.innerHTML = `${namePart ? namePart + ' ' : ''}<span class="bib-number">#${bib}</span>`;

        if(verein.trim()){
          clubLine.textContent = verein.trim();
          clubLine.style.display = "block";
        }
      }catch(err){
        // Falls das Laden fehlschlägt, bleibt die Namensanzeige einfach leer
      }
    }

    async function startCamera(){
      try{
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
        video.srcObject = stream;
        video.style.display = "block";
        photo.style.display = "none";
        statusText.textContent = "Kamera bereit – Bild aufnehmen, sobald du soweit bist.";
        captureBtn.disabled = false;
      }catch(err){
        statusText.textContent = "Kamera konnte nicht gestartet werden: " + err.message;
      }
    }

    function runCountdownAndCapture(){
      captureBtn.disabled = true;
      let count = 5;
      countdownOverlay.style.display = "flex";
      countdownOverlay.textContent = count;
      statusText.textContent = "Bitte lächeln …";

      const timer = setInterval(() => {
        count--;
        if(count > 0){
          countdownOverlay.textContent = count;
        } else {
          clearInterval(timer);
          countdownOverlay.style.display = "none";
          takePhoto();
        }
      }, 1000);
    }

    function takePhoto(){
      const maxWidth = 1200;
      const scale = Math.min(1, maxWidth / video.videoWidth);
      canvas.width = video.videoWidth * scale;
      canvas.height = video.videoHeight * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      photo.src = dataUrl;
      photo.style.display = "block";
      video.style.display = "none";

      canvas.toBlob((blob) => {
        lastImageBlob = blob;
      }, 'image/jpeg', 0.9);

      if(stream){
        stream.getTracks().forEach(track => track.stop());
      }

      statusText.textContent = "Bild aufgenommen!";
      captureBtn.style.display = "none";
      retakeBtn.style.display = "inline-flex";
      saveBtn.style.display = "inline-flex";
    }

    function retake(){
      photo.style.display = "none";
      retakeBtn.style.display = "none";
      saveBtn.style.display = "none";
      newBibBtn.style.display = "none";
      homeBtn.style.display = "none";
      captureBtn.style.display = "inline-flex";
      captureBtn.disabled = false;
      lastImageBlob = null;
      statusText.textContent = "Kamera wird neu gestartet …";
      startCamera();
    }

    async function saveToRaceResult(){
      if(!lastImageBlob || !currentBib){
        statusText.textContent = "Kein Bild oder keine Startnummer vorhanden.";
        return;
      }

      saveBtn.disabled = true;

      try{
        statusText.textContent = "Bild wird hochgeladen …";

        const formData = new FormData();
        formData.append('file', lastImageBlob, `bib_${currentBib}.jpg`);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

        const uploadResponse = await fetch(CLOUDINARY_UPLOAD_URL, {
          method: 'POST',
          body: formData
        });

        const uploadData = await uploadResponse.json();

        if(!uploadResponse.ok || !uploadData.secure_url){
          statusText.textContent = `Fehler beim Hochladen zu Cloudinary: ${JSON.stringify(uploadData)}`;
          saveBtn.disabled = false;
          return;
        }

        const imageUrl = uploadData.secure_url;

        statusText.textContent = `Bild hochgeladen – wird jetzt für Startnummer ${currentBib} in RaceResult gespeichert …`;

        const rrUrl = `${RR_WRITE_URL}?bib=${encodeURIComponent(currentBib)}&fieldname=${encodeURIComponent(RR_FIELD_NAME)}&value=${encodeURIComponent(imageUrl)}&nohistory=0`;
        const rrResponse = await fetch(rrUrl, { method: 'POST' });
        const rrText = await rrResponse.text();

        if(rrResponse.ok){
          statusText.textContent = `Bild erfolgreich für Startnummer ${currentBib} gespeichert.`;
          saveBtn.style.display = "none";
          newBibBtn.style.display = "inline-flex";
          homeBtn.style.display = "inline-flex";
        } else {
          statusText.textContent = `Bild wurde hochgeladen, aber Fehler beim Speichern in RaceResult (${rrResponse.status}): ${rrText}`;
        }
      }catch(err){
        statusText.textContent = "Fehler beim Speichern: " + err.message;
      }finally{
        saveBtn.disabled = false;
      }
    }

    captureBtn.addEventListener('click', runCountdownAndCapture);
    retakeBtn.addEventListener('click', retake);
    saveBtn.addEventListener('click', saveToRaceResult);
  </script>

</body>
</html>
