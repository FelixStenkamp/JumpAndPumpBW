<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Jump & Pump Bad Waldsee</title>
<script type="text/javascript" src="variables.js"></script>
<style>
  :root{
    --accent-color:#a81815;
  }
  html,body{
    scrollbar-width:none;
  }
  body::-webkit-scrollbar{
    display:none;
  }
  body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f4f4f4;
    min-height:100vh;
    padding:40px;
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
  }
  .header{
    text-align:left;
    margin-bottom:40px;
  }
  .header .kicker{
    display:block;
    font-size:14px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--accent-color);
    font-weight:bold;
    margin-bottom:4px;
  }
  .header h1{
    margin:0;
    font-size:32px;
    font-weight:bold;
    color:#222;
    border-left:6px solid var(--accent-color);
    padding-left:14px;
  }
  .container{
    display:flex;
    gap:20px;
    flex-wrap:nowrap;
    width:95%;
    justify-content:center;
    margin:0 auto;
    flex:1;
    align-items:center;
  }
  .box{
    flex:1;
    min-width:180px;
    min-height:250px;
    background:var(--accent-color);
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    border-radius:12px;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    padding:20px;
    box-sizing:border-box;
    transition:.2s;
    box-shadow:0 4px 12px rgba(0,0,0,.2);
  }
  .box:hover{
    transform:scale(1.05);
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
</style>
</head>
<body>

  <div class="header">
    <span class="kicker">Willkommen bei</span>
    <h1>Jump & Pump Bad Waldsee 2027</h1>
  </div>

  <div class="container">
    <a class="box" href="results.html">Ergebnisse anzeigen</a>
    <a class="box" href="live.html">LIVE anzeigen</a>
    <a class="box" href="cam.html">Bild aufnehmen</a>
    <a class="box" href="teilnehmer.html">Teilnehmer anzeigen</a>
  </div>

  <script>
    loadBrandColorStandalone();
  </script>

</body>
</html>
