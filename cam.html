<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Cam – Jump & Pump Bad Waldsee</title>
<style>
  html,body{
    height:100%;
  }
  body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f4f4f4;
    min-height:100vh;
    padding:0;
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
  }
  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    padding:20px 40px;
  }
  .header-text{
    text-align:left;
  }
  .header-text .kicker{
    display:block;
    font-size:14px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#a81815;
    font-weight:bold;
    margin-bottom:4px;
  }
  .header-text h1{
    margin:0;
    font-size:32px;
    font-weight:bold;
    color:#222;
    border-left:6px solid #a81815;
    padding-left:14px;
  }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#a81815;
    color:#fff;
    text-decoration:none;
    font-weight:bold;
    font-size:16px;
    padding:10px 18px;
    border-radius:8px;
    transition:.2s;
    white-space:nowrap;
  }
  .back-link:hover{
    transform:scale(1.05);
    box-shadow:0 4px 12px rgba(0,0,0,.2);
  }
  .content{
    flex:1;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    box-sizing:border-box;
    padding:20px;
    gap:20px;
  }

  .bib-box{
    background:#fff;
    border-radius:12px;
    padding:40px;
    width:100%;
    max-width:360px;
    text-align:center;
    box-shadow:0 4px 16px rgba(0,0,0,.15);
  }
  .bib-box h2{
    margin:0 0 20px;
    color:#a81815;
    font-size:24px;
  }
  .bib-box input{
    width:100%;
    padding:14px;
    font-size:20px;
    text-align:center;
    border:2px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
    margin-bottom:20px;
  }
  .bib-box input:focus{
    outline:none;
    border-color:#a81815;
  }

  .existing-box{
    text-align:center;
  }
  .existing-box img{
    max-width:90%;
    max-height:60vh;
    border-radius:12px;
    box-shadow:0 4px 16px rgba(0,0,0,.25);
    display:block;
    margin:0 auto 20px;
  }
  .existing-box p{
    color:#555;
    margin-bottom:16px;
  }

  .status-text{
    font-size:16px;
    color:#555;
    text-align:center;
    min-height:20px;
  }
  .controls{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .action-btn{
    background:#a81815;
    color:#fff;
    border:none;
    font-weight:bold;
    font-size:18px;
    padding:14px 28px;
    border-radius:8px;
    cursor:pointer;
    transition:.2s;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
  }
  .action-btn:hover{
    transform:scale(1.05);
    box-shadow:0 4px 12px rgba(0,0,0,.2);
  }
  .action-btn:disabled{
    background:#ccc;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
  }
  .action-btn.secondary{
    background:#666;
  }
</style>
</head>
<body>

  <div class="header">
    <div class="header-text">
      <span class="kicker">Jump & Pump Bad Waldsee 2027</span>
      <h1>Bild aufnehmen</h1>
    </div>
    <a class="back-link" href="index.html">&larr; Zurück zur Übersicht</a>
  </div>

  <div class="content">

    <div class="bib-box" id="bibSection">
      <h2>Startnummer eingeben</h2>
      <input type="number" id="bibInput" placeholder="z. B. 123" inputmode="numeric">
      <div class="controls">
        <button class="action-btn" id="bibSubmitBtn">Weiter</button>
      </div>
      <div class="status-text" id="bibStatusText" style="margin-top:16px;"></div>
    </div>

    <div class="existing-box" id="existingSection" style="display:none;">
      <p>Für diese Startnummer ist bereits ein Bild hinterlegt:</p>
      <img id="existingImage" alt="Bestehendes Bild">
      <div class="controls">
        <button class="action-btn" id="overwriteBtn">Überschreiben</button>
        <a class="action-btn secondary" href="index.html">Zur Übersicht</a>
      </div>
    </div>

  </div>

  <script>
    const bibSection = document.getElementById('bibSection');
    const bibInput = document.getElementById('bibInput');
    const bibSubmitBtn = document.getElementById('bibSubmitBtn');
    const bibStatusText = document.getElementById('bibStatusText');

    const existingSection = document.getElementById('existingSection');
    const existingImage = document.getElementById('existingImage');
    const overwriteBtn = document.getElementById('overwriteBtn');

    const RR_EVENT_ID = "410823";
    const RR_READ_API_KEY = "X9JQNUP2KLJPPA16B6YI7I1MDUUN60I8";
    const RR_READ_URL = `https://api.raceresult.com/${RR_EVENT_ID}/${RR_READ_API_KEY}`;

    let currentBib = null;

    async function checkBib(){
      const bib = bibInput.value.trim();
      if(!bib){
        bibInput.focus();
        return;
      }
      currentBib = bib;
      bibSubmitBtn.disabled = true;
      bibStatusText.textContent = "Prüfe, ob bereits ein Bild vorliegt …";

      try{
        const url = `${RR_READ_URL}?filterbib=${encodeURIComponent(bib)}&listformat=JSON`;
        const response = await fetch(url);
        const data = await response.json();
        const existingUrl = extractFinishPic(data, bib);

        if(existingUrl){
          showExisting(existingUrl);
        } else {
          goToCamera(bib);
        }
      }catch(err){
        bibStatusText.textContent = "Konnte nicht prüfen, ob ein Bild existiert (" + err.message + ") – du kannst trotzdem direkt ein neues Bild aufnehmen.";
        goToCamera(bib);
      }finally{
        bibSubmitBtn.disabled = false;
      }
    }

    function extractFinishPic(data, bib){
      let rows = null;

      if(Array.isArray(data)){
        rows = data;
      } else if(data && Array.isArray(data.List)){
        rows = data.List;
      } else if(data && Array.isArray(data.data)){
        rows = data.data;
      } else if(data && Array.isArray(data.rows)){
        rows = data.rows;
      }

      if(!rows || rows.length === 0) return null;

      const first = rows[0];

      if(first && typeof first === 'object' && !Array.isArray(first)){
        const bibKey = Object.keys(first).find(k => k.toLowerCase().replace(/\s/g,'') === 'bib');
        const row = rows.find(r => String(r[bibKey]).trim() === String(bib).trim()) || rows[0];

        const picKey = Object.keys(row).find(k => k.toLowerCase().replace(/\s/g,'') === 'finishpic');
        const value = picKey ? row[picKey] : null;
        const trimmed = (typeof value === 'string') ? value.trim() : value;
        return trimmed ? trimmed : null;
      }

      if(Array.isArray(first)){
        let header = data.fields || data.header || data.Header;
        if(header){
          const idx = header.findIndex(h => String(h).toLowerCase().replace(/\s/g,'') === 'finishpic');
          if(idx >= 0 && rows[0]) return rows[0][idx] || null;
        } else if(rows.length > 1){
          const idx = rows[0].findIndex(h => String(h).toLowerCase().replace(/\s/g,'') === 'finishpic');
          if(idx >= 0 && rows[1]) return rows[1][idx] || null;
        }
      }

      return null;
    }

    function showExisting(imageUrl){
      bibSection.style.display = "none";
      existingImage.src = imageUrl;
      existingSection.style.display = "block";
    }

    function goToCamera(bib){
      window.location.href = `aufnahme.html?bib=${encodeURIComponent(bib)}`;
    }

    bibSubmitBtn.addEventListener('click', checkBib);
    bibInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') checkBib(); });
    overwriteBtn.addEventListener('click', () => goToCamera(currentBib));
  </script>

</body>
</html>
